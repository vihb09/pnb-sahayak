<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PNB Sahayak — Post-call Analytics</title>
<style>
  :root{
    --maroon:#6d1a2d;--maroon-2:#8e2440;--maroon-dark:#4a0f1f;--gold:#e0a82e;--gold-soft:#f6d98a;
    --bg:#0f1116;--panel:#171a21;--panel-2:#1e222c;--line:#2a2f3a;
    --ink:#eef0f4;--muted:#9aa3b2;--green:#43c07a;--amber:#e0a82e;--red:#ef5a6b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%, #2a1420 0%, var(--bg) 55%);color:var(--ink);min-height:100vh;}
  header{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line);
    background:rgba(20,14,20,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5;}
  .logo{width:44px;height:44px;border-radius:13px;flex:0 0 auto;background:linear-gradient(135deg,var(--maroon-2),var(--maroon-dark));
    color:var(--gold-soft);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(142,36,64,.5);}
  header h1{margin:0;font-size:18px;} header .sub{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
  .nav{margin-left:auto;} .nav a{color:var(--muted);text-decoration:none;font-size:12.5px;margin-left:16px;border-bottom:1px dashed transparent;}
  .nav a:hover{color:var(--gold-soft);border-color:var(--gold-soft);}
  main{max-width:1000px;margin:0 auto;padding:22px 18px 60px;}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 8px 24px rgba(0,0,0,.28);}
  .card .num{font-size:32px;font-weight:800;background:linear-gradient(90deg,#fff,var(--gold-soft));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.15;}
  .card .lbl{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  @media (max-width:760px){.grid2{grid-template-columns:1fr;}.cards{grid-template-columns:repeat(2,1fr);}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 8px 24px rgba(0,0,0,.28);}
  .panel h2{font-size:14px;margin:0 0 12px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.5px;}
  .full{margin-top:16px;}
  audio{width:100%;margin-bottom:14px;filter:saturate(.8);}
  .legend{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 5px 0 14px;vertical-align:middle;}
  .dot.s0{background:var(--maroon-2);}.dot.s1{background:var(--green);}
  .turn{display:flex;margin:10px 0;gap:10px;}
  .turn.right{flex-direction:row-reverse;}
  .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;}
  .turn.s0 .avatar{background:linear-gradient(135deg,var(--maroon-2),var(--maroon-dark));}
  .turn.s1 .avatar{background:linear-gradient(135deg,#2f6d47,var(--green));}
  .bubble{max-width:74%;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:9px 13px;}
  .turn.right .bubble{background:#152019;}
  .bubble .who{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;gap:10px;align-items:center;}
  .bubble .who b{color:var(--ink);}
  .bubble .stamp{color:var(--muted);font-family:monospace;font-size:10.5px;}
  .bubble .txt{font-size:14px;line-height:1.42;}
  .bar-row{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:14px;}
  .bar-row .name{width:96px;flex:0 0 auto;color:var(--ink);}
  .bar-wrap{flex:1;background:var(--panel-2);border-radius:6px;overflow:hidden;height:18px;border:1px solid var(--line);}
  .bar{height:100%;}
  .bar.s0{background:linear-gradient(90deg,var(--maroon-2),var(--gold));}
  .bar.s1{background:linear-gradient(90deg,#2f6d47,var(--green));}
  .bar-row .cnt{width:54px;text-align:right;color:var(--muted);flex:0 0 auto;}
  .sum h3{font-size:13px;color:var(--gold-soft);margin:14px 0 6px;}
  .sum h3:first-child{margin-top:0;}
  .sum ul{margin:0 0 6px;padding-left:20px;} .sum li{font-size:14px;line-height:1.5;margin:3px 0;}
  .sum p{font-size:14px;line-height:1.5;margin:6px 0;}
  .muted{color:var(--muted);}
  .empty{color:var(--muted);text-align:center;padding:28px;line-height:1.6;}
  .empty code{background:var(--panel-2);padding:2px 7px;border-radius:6px;color:var(--gold-soft);}
</style>
</head>
<body>
<header>
  <div class="logo">पं</div>
  <div><h1>Post-call Analytics</h1><div class="sub">Offline call analysis — diarised transcript, speaking time & AI summary · Sarvam Saaras + sarvam-30b</div></div>
  <div class="nav"><a href="/">← Assistant</a><a href="/dashboard">Dashboard</a><a href="/stream">Live</a></div>
</header>
<main id="main"><div class="empty">Loading…</div></main>
<script>
function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function inlineMd(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}
function fmtSummary(text){
  const lines=(text||'').split(/\r?\n/); let html=''; let inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(const raw of lines){
    const line=raw.trim(); if(!line) continue; let m;
    if(m=line.match(/^\*\*(.+?)\*\*:?$/)){ closeList(); html+='<h3>'+esc(m[1])+'</h3>'; continue; }
    if(m=line.match(/^[\*\-]\s+(.+)$/)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inlineMd(m[1])+'</li>'; continue; }
    closeList(); html+='<p>'+inlineMd(line)+'</p>';
  }
  closeList(); return html||'<p class="muted">No summary.</p>';
}
async function load(){
  const main=document.getElementById('main');
  let d; try{ d=await (await fetch('/api/call_report')).json(); }
  catch(e){ main.innerHTML='<div class="empty">Could not load the report — is the app running?</div>'; return; }
  if(!d.available){
    main.innerHTML='<div class="empty">No call report yet.<br/><br/>Generate one by running <code>py src/call_analytics.py</code> from the project root, then refresh this page.</div>';
    return;
  }
  const entries=d.entries||[], talk=d.talk||[];
  const speakers=[...new Set(entries.map(e=>String(e.speaker)))].sort();
  const firstSpk=speakers[0];
  const cls=sp=>(String(sp)===firstSpk)?'s0':'s1';
  const totalSecs=talk.reduce((a,t)=>a+t.secs,0);
  const cards=`<div class="cards">
    <div class="card"><div class="num">${entries.length}</div><div class="lbl">Conversation turns</div></div>
    <div class="card"><div class="num">${speakers.length}</div><div class="lbl">Speakers detected</div></div>
    <div class="card"><div class="num">${totalSecs.toFixed(0)}s</div><div class="lbl">Total talk time</div></div>
    <div class="card"><div class="num">EN</div><div class="lbl">Call language</div></div>
  </div>`;
  const audio=d.audio_available?`<audio controls src="/api/call_audio"></audio>`:'';
  const legend=`<div class="legend">Speakers:`+speakers.map(s=>`<span class="dot ${cls(s)}"></span>Speaker ${esc(s)}`).join('')+`</div>`;
  const turns=entries.map(e=>{
    const sp=String(e.speaker), side=(sp===firstSpk)?'':'right';
    const stamp=(e.start!=null&&e.end!=null)?`<span class="stamp">${e.start.toFixed(1)}–${e.end.toFixed(1)}s</span>`:'';
    return `<div class="turn ${cls(sp)} ${side}"><div class="avatar">${esc(sp)}</div><div class="bubble"><div class="who"><b>Speaker ${esc(sp)}</b>${stamp}</div><div class="txt">${esc(e.text)}</div></div></div>`;
  }).join('');
  const transcript=`<div class="panel full"><h2>Diarised transcript — who said what</h2>${audio}${legend}${turns||'<div class="empty">No transcript.</div>'}</div>`;
  const maxSecs=Math.max(1,...talk.map(t=>t.secs));
  const bars=talk.map(t=>{const sp=String(t.speaker);const pct=Math.round(100*t.secs/maxSecs);
    return `<div class="bar-row"><span class="name">Speaker ${esc(sp)}</span><span class="bar-wrap"><span class="bar ${cls(sp)}" style="width:${pct}%"></span></span><span class="cnt">${t.secs.toFixed(1)}s</span></div>`;}).join('');
  const speaking=`<div class="panel"><h2>Speaking time</h2>${bars||'<div class="empty">—</div>'}</div>`;
  const summary=`<div class="panel"><h2>AI call summary</h2><div class="sum">${fmtSummary(d.summary)}</div></div>`;
  main.innerHTML=cards+transcript+`<div class="grid2">${speaking}${summary}</div>`;
}
load();
</script>
</body>
</html>
